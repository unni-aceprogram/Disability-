<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap">
<meta charset="UTF-8" />
<title>Disability Retest | Quiz 2</title>
<style>
body {
font-family: 'Inter', Arial, sans-serif;
background: linear-gradient(120deg, #e3f6f5 0%, #ffe8d6 100%);
color: #23395d;
min-height: 100vh;
margin: 0;
padding: 0;
}

.container {
width: 96%;
max-width: 500px;
margin: 40px auto 0 auto;
background: #fff;
border-radius: 20px;
box-shadow: 0 8px 32px rgba(34,57,93,0.15);
padding: 32px 24px;
position: relative;
}

h1 {
font-size: 2.2em;
color: #207bfa;
font-weight: 700;
letter-spacing: 1px;
margin-bottom: 10px;
}

#progress-container {
width: 100%;
background: #e9ecef;
height: 12px;
border-radius: 6px;
overflow: hidden;
margin-bottom: 10px;
}

#progress-bar {
height: 100%;
width: 0%;
background: linear-gradient(90deg, #207bfa 0%, #43cea2 100%);
transition: width 0.4s ease;
}

#question-counter {
font-size: 1.1em;
font-weight: 600;
color: #525252;
margin: 10px 0 18px 0;
text-align: center;
}

.card {
background: #f9f9fb;
padding: 28px 24px;
border-radius: 16px;
box-shadow: 0 2px 14px rgba(34,57,93,0.07);
text-align: left;
}

.options label {
display: block;
background: #f5fafd;
font-size: 1em;
margin: 10px 0;
cursor: pointer;
padding: 11px 16px;
border-radius: 8px;
border: 2px solid #e3f6f5;
transition: background 0.3s, border-color 0.3s;
}

.options input {
margin-right: 11px;
}

.btn {
display: inline-block;
margin: 18px 10px 0 0;
padding: 12px 30px;
font-size: 1.15em;
font-weight: 600;
cursor: pointer;
border: none;
border-radius: 8px;
background: linear-gradient(90deg, #207bfa 0%, #43cea2 100%);
color: #fff;
box-shadow: 0 3px 10px rgba(34,57,93,0.08);
transition: background 0.25s;
}

.btn:hover { background: linear-gradient(90deg, #43cea2 0%, #207bfa 100%); }

.correct {
background: #e6ffed !important;
border-color: #43cea2 !important;
opacity: 0.6;
pointer-events: none;
}

.wrong {
background: #ffebef !important;
border-color: #fa205c !important;
opacity: 0.6;
pointer-events: none;
}

.disabled-option {
opacity: 0.6;
pointer-events: none;
}

.timer {
font-weight: bold;
margin-bottom: 15px;
font-size: 1.08em;
color: #207bfa;
}

.timer.red { color: #fa205c; }
.timer.green { color: #43cea2; }

.explanation {
margin-top: 18px;
padding: 12px 16px;
background: #f6f3e9;
border-left: 5px solid #43cea2;
border-radius: 0 8px 8px 0;
font-size: 0.99em;
color: #525252;
}

#alert {
display: none;
font-size: 1.07em;
color: #fa205c;
letter-spacing: 0.5px;
margin: 6px 0;
font-weight: 700;
text-align: center;
}

#sound-toggle {
margin: 18px 0;
cursor: pointer;
font-size: 1em;
color: #43cea2;
font-weight: 600;
}

#score-container {
margin-top: 22px;
text-align: center;
}

.highlight-latest-result {
font-size: 1.33em;
font-weight: 800;
letter-spacing: 1px;
margin-bottom: 18px;
color: #207bfa;
}

#time-up-message {
font-size: 1.1em;
color: #fa205c;
font-weight: bold;
margin-top: 10px;
}
</style>
</head>
<body>
<div class="container">
<h1>Disability Retest | Quiz 2</h1>
<div id="sound-toggle" onclick="toggleSound()">
<span id="sound-icon">🔊</span> <span id="sound-text">Sound ON</span>
</div>
<div id="progress-container"><div id="progress-bar"></div></div>
<div id="question-counter">Questions: 25</div>
<div id="alert">⏰ Hurry! Time is almost up!</div>
<div id="quiz-container"></div>
<div id="score-container"></div>
<button id="start-button" class="btn">Start Quiz</button>
</div>
 <audio id="correct-sound" src="https://dm0qx8t0i9gc9.cloudfront.net/watermarks/audio/B4CWlP_CIkc1kju2x/audioblocks-feedback-correct-07_HiQUhCpDv_WM.mp3" preload="auto"></audio>
<audio id="wrong-sound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const quizDataPart2 = [

  {
    "question": "Which SSR code is used for a passenger who can walk short distances but requires a wheelchair for long distances?",
    "options": ["WCHS", "WCHR", "WCHC", "MEDA"],
    "correct": 1,
    "explanation": "WCHR (Wheelchair Ramp) is used for passengers who can walk short distances and climb steps but need assistance within the terminal."
  },

  {
    "question": "Which SSR code indicates a passenger who cannot walk and requires wheelchair assistance up to the aircraft seat?",
    "options": ["WCHS", "BLND", "WCHC", "DEAF"],
    "correct": 2,
    "explanation": "WCHC (Wheelchair Cabin) is used for passengers who require assistance up to their seat in the aircraft."
  },

  {
    "question": "Which SSR code is used for a passenger who is both blind and deaf?",
    "options": ["DEAF", "BLND", "WCHR", "MEDA"],
    "correct": 1,
    "explanation": "BLND is used for visually impaired passengers. Additional remarks are added if the passenger is both blind and deaf."
  },

  {
    "question": "When providing assistance to a visually impaired passenger, staff should:",
    "options": [
      "Pull the passenger by the arm",
      "Offer their elbow for guidance",
      "Push from behind",
      "Walk ahead without contact"
    ],
    "correct": 1,
    "explanation": "Staff should offer their elbow so the passenger can hold and walk comfortably beside them."
  },

  {
    "question": "Mobility aids with non-spillable batteries are:",
    "options": [
      "Not accepted for travel",
      "Allowed only in cargo",
      "Accepted as checked-in baggage",
      "Allowed only on international flights"
    ],
    "correct": 2,
    "explanation": "Wheelchairs or mobility aids with non-spillable batteries are accepted as checked-in baggage as per regulations."
  },

  {
    "question": "Passengers requiring oxygen during flight are categorized under which SSR?",
    "options": ["INFT", "MEDA", "SVAN", "WCHS"],
    "correct": 1,
    "explanation": "MEDA (Medical Assistance) SSR is used for passengers requiring medical clearance or special medical support."
  },

  {
    "question": "Passengers seated in emergency exit rows must:",
    "options": [
      "Be medically certified",
      "Be physically able to operate the exit",
      "Travel with an attendant",
      "Be frequent flyers"
    ],
    "correct": 1,
    "explanation": "Emergency exit row passengers must be physically capable of operating the exit in case of emergency."
  },

  {
    "question": "A passenger with hearing impairment is identified using which SSR code?",
    "options": ["DEAF", "BLND", "WCHC", "STCR"],
    "correct": 0,
    "explanation": "DEAF SSR code is used for passengers with hearing impairment."
  },

  {
    "question": "When assisting a wheelchair passenger during boarding, staff should:",
    "options": [
      "Board them last without priority",
      "Ensure priority boarding",
      "Ask them to walk if possible",
      "Charge additional service fee"
    ],
    "correct": 1,
    "explanation": "Passengers requiring wheelchair assistance are provided priority boarding."
  },

  {
    "question": "If a passenger is traveling with a personal wheelchair, it should be:",
    "options": [
      "Charged as sports equipment",
      "Refused due to size",
      "Tagged appropriately and carried free of charge",
      "Allowed only in cabin"
    ],
    "correct": 2,
    "explanation": "Personal wheelchairs are tagged properly and carried free of charge."
  },

  {
    "question": "Passengers with intellectual disabilities should be treated with:",
    "options": [
      "Impatience",
      "Respect and clear communication",
      "Medical terminology",
      "Strict instructions only"
    ],
    "correct": 1,
    "explanation": "Staff must treat passengers with intellectual disabilities respectfully and communicate clearly."
  },

  {
    "question": "If a passenger refuses wheelchair assistance after booking WCHR, staff should:",
    "options": [
      "Force the service",
      "Cancel the booking",
      "Update the SSR accordingly",
      "Deny boarding"
    ],
    "correct": 2,
    "explanation": "If assistance is declined, the SSR must be updated in the system."
  },

  {
    "question": "A passenger traveling with an escort due to medical reasons must:",
    "options": [
      "Pay double fare",
      "Have escort details recorded in PNR",
      "Sit separately",
      "Book cargo space"
    ],
    "correct": 1,
    "explanation": "Escort details must be properly recorded in the PNR for safety and coordination."
  },

  {
    "question": "When explaining safety instructions to a visually impaired passenger, crew should:",
    "options": [
      "Skip the briefing",
      "Provide individual safety briefing verbally",
      "Hand over only safety card",
      "Ask another passenger to explain"
    ],
    "correct": 1,
    "explanation": "Crew must provide a personal verbal safety briefing to visually impaired passengers."
  },

  {
    "question": "Passengers using prosthetic limbs are:",
    "options": [
      "Not allowed to travel",
      "Required to submit medical certificate",
      "Allowed to travel without restrictions",
      "Seated only in last row"
    ],
    "correct": 2,
    "explanation": "Passengers with prosthetic limbs are allowed to travel without special restrictions unless medical condition requires otherwise."
  },

  {
    "question": "Battery terminals of mobility aids must be:",
    "options": [
      "Left exposed",
      "Disconnected and protected from short circuit",
      "Removed permanently",
      "Painted for identification"
    ],
    "correct": 1,
    "explanation": "Battery terminals must be disconnected and protected to prevent short circuits."
  },

  {
    "question": "Passengers who are unable to understand safety instructions may require:",
    "options": [
      "Emergency exit seating",
      "Additional cabin baggage",
      "A safety assistant or escort",
      "Priority baggage handling"
    ],
    "correct": 2,
    "explanation": "Passengers unable to comprehend safety instructions may require an escort for safety compliance."
  },

  {
    "question": "During disembarkation, wheelchair passengers should:",
    "options": [
      "Disembark first without assistance",
      "Wait until assistance equipment arrives",
      "Be asked to walk",
      "Carry their own wheelchair"
    ],
    "correct": 1,
    "explanation": "Wheelchair passengers should wait until proper assistance equipment is positioned."
  },

  {
    "question": "Passengers requiring special meals due to medical reasons should:",
    "options": [
      "Bring their own food",
      "Inform airline during booking",
      "Request after boarding",
      "Avoid long flights"
    ],
    "correct": 1,
    "explanation": "Special meal requirements must be informed at the time of booking."
  },

  {
    "question": "If an assistive device is damaged, staff must:",
    "options": [
      "Ignore the issue",
      "Advise passenger to claim later",
      "Follow damage reporting procedures immediately",
      "Charge repair fee"
    ],
    "correct": 2,
    "explanation": "Any damage to assistive devices must be reported and processed as per airline procedures."
  },

  {
    "question": "Passengers with temporary injuries (e.g., fractured leg) should be categorized under:",
    "options": ["WCHR/WCHS/WCHC as applicable", "BLND", "SVAN", "INFT"],
    "correct": 0,
    "explanation": "Temporary mobility limitations are categorized under appropriate wheelchair SSR codes."
  },

  {
    "question": "Staff should avoid which behavior while assisting PRM customers?",
    "options": [
      "Asking how they prefer assistance",
      "Making assumptions about limitations",
      "Using respectful language",
      "Providing clear instructions"
    ],
    "correct": 1,
    "explanation": "Staff must not assume limitations; always ask how they prefer to be assisted."
  },

  {
    "question": "Passengers with service animals other than guide dogs are:",
    "options": [
      "Automatically approved",
      "Allowed without documentation",
      "Subject to airline policy and approval",
      "Allowed in cabin without notice"
    ],
    "correct": 2,
    "explanation": "Service animals other than guide dogs are subject to airline approval and policies."
  },

  {
    "question": "Passengers requiring continuous medical monitoring onboard must:",
    "options": [
      "Travel without escort",
      "Sit in exit row",
      "Have prior medical clearance",
      "Pay excess baggage"
    ],
    "correct": 2,
    "explanation": "Continuous medical monitoring requires prior medical clearance from the airline."
  },

  {
    "question": "Respectful communication with PRM passengers includes:",
    "options": [
      "Talking only to companion",
      "Using childlike tone",
      "Maintaining eye contact and speaking clearly",
      "Ignoring direct questions"
    ],
    "correct": 2,
    "explanation": "Staff should maintain eye contact and speak clearly and respectfully to the passenger."
  }

];





    let currentQuestion = 0;
let score = 0;
let timer;
let timeLeft = 60;
let soundOn = true;
let soundEnabled = true;
const userAnswers = [];
const allResults = [];

const quizContainer = document.getElementById("quiz-container");
const scoreContainer = document.getElementById("score-container");
const progressBar = document.getElementById("progress-bar");
const questionCounter = document.getElementById("question-counter");
const alertBox = document.getElementById("alert");
const startButton = document.getElementById("start-button");
const correctSound = document.getElementById("correct-sound");
const wrongSound = document.getElementById("wrong-sound");

function startQuiz() {
currentQuestion = 0;
score = 0;
userAnswers.length = 0;
quizStartTime = new Date(); 
startButton.style.display = "none";
scoreContainer.innerHTML = "";
showQuestion();
}

function showQuestion() {
clearInterval(timer);
timeLeft = 60;
updateTimer();
alertBox.style.display = "none";
const questionData = quizData[currentQuestion];
quizContainer.innerHTML = `
<div class="card">
<div class="timer" id="timer">Time left: ${timeLeft}s</div>
<h2>${questionData.question}</h2>
<div class="options">
${questionData.options.map((opt, i) =>
`<label class=""><input type="radio" name="answer" value="${i}"> ${opt}</label>`
).join("")}
</div>
<div id="warning-message"></div>
<button class="btn" onclick="submitAnswer()">Submit</button>
</div>
`;
questionCounter.textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
progressBar.style.width = `${((currentQuestion) / quizData.length) * 100}%`;

timer = setInterval(() => {
timeLeft--;
updateTimer();
if (timeLeft <= 5) alertBox.style.display = "block";
if (timeLeft === 0) submitAnswer(true);
}, 1000);
}

function updateTimer() {
const timerEl = document.getElementById("timer");
if (!timerEl) return;
timerEl.textContent = `Time left: ${timeLeft}s`;
timerEl.className = "timer " + (timeLeft <= 5 ? "red" : "green");
}

function submitAnswer(auto = false) {
const selected = document.querySelector('input[name="answer"]:checked');
const questionData = quizData[currentQuestion];

if (!selected && !auto) {
const warning = document.getElementById("warning-message");
if (warning) warning.textContent = "⚠️ Please select an option before submitting.";
return;
}

clearInterval(timer);
alertBox.style.display = "none";

const warning = document.getElementById("warning-message");
if (warning) warning.textContent = "";

let isCorrect = false;

if (selected) {
const answer = parseInt(selected.value);
userAnswers[currentQuestion] = answer;
if (answer === questionData.correct) {
score++;
isCorrect = true;
}
} else {
userAnswers[currentQuestion] = null;
}

const optionsLabels = document.querySelectorAll(".options label");
optionsLabels.forEach((label, i) => {
label.classList.add("disabled");
const input = label.querySelector('input');
if (input) input.disabled = true;

if (i === questionData.correct) label.classList.add("correct");
else if (selected && i === parseInt(selected.value)) label.classList.add("wrong");
});

const submitBtn = quizContainer.querySelector("button.btn");
if (submitBtn) submitBtn.disabled = true;

quizContainer.innerHTML += `
<div class="explanation"><strong>Explanation:</strong> ${questionData.explanation}</div>
<button class="btn" onclick="nextQuestion()">Next</button>
`;

setTimeout(() => {
showResult(isCorrect);
}, 150);

progressBar.style.width = `${((currentQuestion + 1) / quizData.length) * 100}%`;

allResults[currentQuestion] = {
question: questionData.question.trim(),
selected: selected ? parseInt(selected.value) : null,
correct: questionData.correct,
options: questionData.options.map(o => o.trim()),
explanation: questionData.explanation.trim(),
};
}

function showResult(correct) {
const sound = correct ? correctSound : wrongSound;
sound.currentTime = 0;
if (soundEnabled) sound.play();

if (correct) {
confetti();
setTimeout(() => {
sound.pause();
sound.currentTime = 0;
}, 2400);
}
}

function nextQuestion() {
currentQuestion++;
if (currentQuestion >= quizData.length) {
showScore();
} else {
showQuestion();
}
}

function showScore() {
const endTime = new Date();
const timeTaken = Math.floor((endTime - quizStartTime) / 1000); 
const percentage = Math.round((score / quizData.length) * 100);
const passed = percentage >= 90;

quizContainer.innerHTML = "";
questionCounter.textContent = `Quiz Completed!`;
progressBar.style.width = "100%";

let resultMessage = `
<div class="highlight-latest-result">
You scored ${score} out of ${quizData.length} (${percentage}%)
<br><span style="color:${passed ? '#43cea2' : '#fa205c'}; font-weight:bold;">
${passed ? "✅ Passed!" : "❌ Not Passed"}
</span>
</div>
`;

let buttonsHTML = `
<div class="button-group">
<button class="btn" onclick="startQuiz()">Restart Quiz</button>
<button class="btn" onclick="toggleReview()">Review Answers</button>
<button class="btn" onclick="downloadResultsPDF(${score}, ${quizData.length}, ${timeTaken})">Share Results</button>
<button class="btn" onclick="goHome()">Homepage</button>
</div>
<div id="review-section"></div>
`;

scoreContainer.innerHTML = resultMessage + buttonsHTML;
}

function toggleReview() {
const reviewSection = document.getElementById("review-section");
if (reviewSection.innerHTML.trim() !== "") {
reviewSection.innerHTML = "";
} else {
let resultsHTML = `<h3 style="text-align:center;">Review Your Answers:</h3>`;
allResults.forEach((result, i) => {
const userAnswerIndex = result.selected;
const correctIndex = result.correct;
resultsHTML += `
<div class="card" style="margin-bottom:15px; text-align:left;">
<strong>Q${i + 1}: ${result.question}</strong><br>
Your answer: ${userAnswerIndex === null ? "No answer" : result.options[userAnswerIndex]} ${userAnswerIndex === correctIndex ? "✅" : "❌"}<br>
Correct answer: ${result.options[correctIndex]}<br>
<div class="explanation">${result.explanation}</div>
</div>
`;
});
reviewSection.innerHTML = resultsHTML;
}
}

function downloadResultsPDF(score, total, timeTaken) {
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
const now = new Date();
const formattedDate = now.toLocaleString();
const percentage = Math.round((score / total) * 100) + "%";

doc.setFont("helvetica", "bold");
doc.setFontSize(16);
doc.text("ACE Practice Set Results", 20, 20);

const headers = ["Date", "Score", "Time Taken"];
const data = [[ formattedDate, `${score} / ${total} (${percentage})`, `${timeTaken} seconds` ]];

const startX = 20;
const startY = 30;
const colWidths = [60, 60, 60];
const rowHeight = 10;

headers.forEach((header, i) => {
doc.setFillColor(240, 240, 240);
doc.rect(startX + colWidths.slice(0, i).reduce((a, b) => a + b, 0), startY, colWidths[i], rowHeight, 'FD');
doc.setTextColor(0);
doc.setFontSize(12);
doc.text(header.trim(), startX + colWidths.slice(0, i).reduce((a, b) => a + b, 0) + 2, startY + 7);
});

data[0].forEach((text, i) => {
const x = startX + colWidths.slice(0, i).reduce((a, b) => a + b, 0);
const y = startY + rowHeight;
doc.rect(x, y, colWidths[i], rowHeight); 
doc.text(text.trim(), x + 2, y + 7);
});

doc.save("quiz_results.pdf");
}

function goHome() {
window.location.href = "index.html";
}
function toggleSound() {
soundOn = !soundOn;
soundEnabled = soundOn;
const icon = document.getElementById("sound-icon");
const text = document.getElementById("sound-text");
if (soundOn) {
icon.textContent = "🔊";
text.textContent = "Sound ON";
} else {
icon.textContent = "🔇";
text.textContent = "Sound OFF";
}
}

startButton.addEventListener("click", startQuiz);
</script>
</body>
</html>
