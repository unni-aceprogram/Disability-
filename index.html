        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        ['State/UT', 'City', 'Airport Name', 'IATA Code'].forEach(text => {

<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    body { font-family: Arial, sans-serif; background: #f4f7fb; padding: 20px; margin: 0; color: #333; }

    .options input[type="radio"] { margin-right: 10px; }

<body>

<div class="top-bar">
  <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="question-counter" id="question-counter">Ready?</div>

</div>

<h2>IATA CODES</h2>

<div id="score-container"></div>
<div id="quiz-container"></div>
<div class="alert" id="alert">Hurry up! Time's running out!</div>

<button id="start-button" onclick="startQuiz()">Start Quiz</button>

<audio id="correct-sound" src="https://dm0qx8t0i9gc9.cloudfront.net/watermarks/audio/B4CWlP_CIkc1kju2x/audioblocks-feedback-correct-07_HiQUhCpDv_WM.mp3" preload="auto"></audio>
<audio id="wrong-sound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3" preload="auto"></audio>
<div class="footnote">Prepared by Krishnanunni, ifly BLR</div>
<script>
const progressBar = document.getElementById("progress-bar");
const questionCounter = document.getElementById("question-counter");
const container = document.getElementById("quiz-container");

const startButton = document.getElementById("start-button");
const alertElement = document.getElementById("alert");

let currentIndex = 0, score = 0, startTime, timerInterval, sortNewestFirst = true;
let answeredQuestions = [];

const RESULTS_PER_PAGE = 5;
let currentPage = 1;

const quizData =[
  {

    "options": ["DEL", "BOM", "BLR", "MAA"],

  {
    "question": "What is the IATA code for Chennai International Airport?",
    "options": ["BLR", "DEL", "MAA", "BOM"],

  },
  {
    "question": "What is the IATA code for Netaji Subhas Chandra Bose International Airport in Kolkata?",
    "options": ["BOM", "BLR", "DEL", "CCU"],

    "explanation": "The IATA code for Kolkata Airport is CCU. It was the first airport in eastern India to have a major international terminal upgrade."
  },
  {
    "question": "What is the IATA code for Kurnool Airport in Andhra Pradesh?",
    "options": ["JRG", "DBR", "KJB", "JRH"],
    "answer_index": 2,
    "explanation": "The IATA code for Kurnool Airport is KJB. It was inaugurated in 2021 and is named after Uyyalawada Narasimha Reddy, a freedom fighter from the region."
  },
  {
    "question": "What is the IATA code for Jorhat Airport (Rowriah Airport) in Assam?",
    "options": ["DBR", "JRH", "JRG", "KJB"],
    "answer_index": 1,
    "explanation": "The IATA code for Jorhat Airport is JRH. It serves as a base for the Indian Air Force and provides access to Majuli, the world’s largest river island."
  },
  {
    "question": "What is the IATA code for Darbhanga Airport in Bihar?",
    "options": ["JRH", "DBR", "KJB", "JRG"],
    "answer_index": 1,
    "explanation": "The IATA code for Darbhanga Airport is DBR. It is one of the fastest-growing airports in eastern India, opened for commercial flights in 2020."
  },
  {
    "question": "What is the IATA code for Pakyong Airport in Sikkim?",
    "options": ["KJB", "DBR", "PYG", "JRH"],
    "answer_index": 2,
    "explanation": "The IATA code for Pakyong Airport is PYG. It is one of the highest-altitude airports in India, offering stunning views of the Himalayas."
  },
  {
    "question": "What is the IATA code for Jharsuguda Airport in Odisha?",
    "options": ["PYG", "JRG", "KJB", "DBR"],
    "answer_index": 1,
    "explanation": "The IATA code for Jharsuguda Airport is JRG. It is also known as Veer Surendra Sai Airport, named after a legendary freedom fighter from Odisha."
  }
]




function saveScore(score, totalQuestions) {
  const totalTime = Math.floor((Date.now() - startTime) / 1000);
  const percentage = Math.round((score / totalQuestions) * 100);
  const history = JSON.parse(localStorage.getItem("quizHistory")) || [];
  history.push({
    title: document.querySelector("h2").textContent,
    score,
    totalQuestions,
    percentage,
    time: `${Math.floor(totalTime / 60)}m ${totalTime % 60}s`,
    date: new Date().toLocaleString()
  });
  localStorage.setItem("quizHistory", JSON.stringify(history));
}

function renderQuestion(index) {
  clearInterval(timerInterval);
  alertElement.style.display = "none";
  const q = quizData[index];
  container.innerHTML = `
    <div class="card">
      <div class="header"><div class="timer green" id="timer"></div></div>
      <div class="question">${q.question}</div>
      <div class="options">
        ${q.options.map((opt, i) =>
          `<label><input type="radio" name="option" value="${i}">${opt}</label>`).join("")}
      </div>
      <button class="btn" id="submit-btn">Submit</button>
    </div>
  `;
  progressBar.style.width = `${((index + 1) / quizData.length) * 100}%`;
  questionCounter.textContent = `Q ${index + 1} / ${quizData.length}`;
  document.getElementById("submit-btn").onclick = () => submitAnswer(index);
  startTimer();
}

function submitAnswer(index) {
  if (answeredQuestions[index]) return;
  const selected = document.querySelector('input[name="option"]:checked');
  if (!selected) return;
  clearInterval(timerInterval);
  alertElement.style.display = "none";

  const correctIndex = quizData[index].answer_index;
  const allOptions = document.querySelectorAll('input[name="option"]');
  allOptions.forEach(opt => opt.disabled = true);

  const selectedLabel = selected.closest("label");
  const correctLabel = allOptions[correctIndex].closest("label");

  const isCorrect = parseInt(selected.value) === correctIndex;
  isCorrect ? (score++, selectedLabel.classList.add("correct")) : (selectedLabel.classList.add("wrong"), correctLabel.classList.add("correct"));

  showResult(isCorrect);
  answeredQuestions[index] = true;

  const explanation = quizData[index].explanation;
  const card = document.querySelector(".card");
  const explanationDiv = document.createElement("div");
  explanationDiv.className = "explanation";
  explanationDiv.textContent = `Explanation: ${explanation}`;

  const nextButton = document.createElement("button");
  nextButton.className = "btn";
  nextButton.textContent = currentIndex + 1 < quizData.length ? "Next Question" : "Finish Quiz";
  nextButton.onclick = () => {
    currentIndex++;
    currentIndex < quizData.length ? renderQuestion(currentIndex) : endQuiz();
  };

  card.appendChild(explanationDiv);
  card.appendChild(nextButton);
  explanationDiv.scrollIntoView({ behavior: "smooth", block: "start" });
}

function startTimer() {
  let remainingTime = 30;
  const timer = document.getElementById("timer");
  timer.textContent = `Time: ${remainingTime}s`;
  timer.className = "timer green";

  timerInterval = setInterval(() => {
    remainingTime--;
    timer.textContent = `Time: ${remainingTime}s`;

    if (remainingTime <= 10) {
      timer.className = "timer red";
      if (container.style.display === "block") {
        alertElement.style.display = "block";
      }
    } else {
      alertElement.style.display = "none";
    }

    if (remainingTime <= 0) {
      clearInterval(timerInterval);
      alertElement.style.display = "none";
      submitAnswer(currentIndex);
    }
  }, 1000);
}

function showResult(correct) {
  const sound = correct ? correctSound : wrongSound;
  sound.currentTime = 0;
  sound.play();
  if (correct) triggerConfetti();
  if (correct) {
    setTimeout(() => { sound.pause(); sound.currentTime = 0; }, 2400);
  }
}

function triggerConfetti() {
  confetti({ particleCount: 100, spread: 70, origin: { x: 0.5, y: 0.5 }, colors: ['#ff0', '#ff5c5c', '#5c5cff', '#4caf50'] });
}

function startQuiz() {
  score = 0;
  currentIndex = 0;
  answeredQuestions = new Array(quizData.length).fill(false);
  startTime = Date.now();
  startButton.style.display = "none";
  container.style.display = "block";
  renderQuestion(currentIndex);
}

function endQuiz() {
  clearInterval(timerInterval);
  alertElement.style.display = "none";
  const percentage = ((score / quizData.length) * 100).toFixed(1);
  scoreContainer.innerHTML = `
    <div class="highlight-latest-result">🎉 You scored ${score} / ${quizData.length} (${percentage}%)</div>
    <div class="score-display">
      <p>Your Score: ${score} out of ${quizData.length}</p>
      <p>Percentage: ${percentage}%</p>
      <p>Time Taken: ${Math.floor((Date.now() - startTime) / 1000)} seconds</p>
      <div class="history-actions">
        <button class="btn" onclick="viewHistory()">📖 View History</button>
        <button class="btn" onclick="restartQuiz()">🔄 Restart Quiz</button>
      </div>
    </div>
  `;
  container.style.display = "none";
  saveScore(score, quizData.length);
}

  function viewHistory() {
    clearInterval(timerInterval);
    alertElement.style.display = "none";
    const history = JSON.parse(localStorage.getItem("quizHistory")) || [];
    const sorted = [...history];
    if (sortNewestFirst) sorted.reverse();
    const paginated = sorted.slice((currentPage - 1) * RESULTS_PER_PAGE, currentPage * RESULTS_PER_PAGE);

    let html = `
      <h3>Quiz History</h3>
      <p>Total Attempts: ${history.length}</p>
      <button class="sort-button" onclick="toggleSortOrder()">Sort: ${sortNewestFirst ? "Newest First ⬆️" : "Oldest First ⬇️"}</button>
      <table class="history-table">
        <thead><tr><th>Date</th><th>Quiz Title</th><th>Score</th><th>Percentage</th><th>Time</th></tr></thead>
        <tbody>
    `;

    paginated.forEach((entry, i) => {
      html += `<tr${i === 0 && currentPage === 1 ? ' class="latest-score"' : ""}>
        <td>${entry.date}</td>
        <td>${entry.title}</td>
        <td>${entry.score} / ${entry.totalQuestions}</td>
        <td>${entry.percentage}%</td>
        <td>${entry.time}</td>
      </tr>`;
    });

    html += `
        </tbody>
      </table>
      <div class="pagination-info">Page ${currentPage}</div>
      <div class="history-actions">
        <button class="btn" onclick="navigateHistory(-1)" ${currentPage <= 1 ? "style='display:none'" : ""}>Previous</button>
        <button class="btn" onclick="navigateHistory(1)" ${(currentPage * RESULTS_PER_PAGE >= sorted.length) ? "disabled" : ""}>Next</button>
        <button class="btn" onclick="restartQuiz()">🔄 Restart Quiz</button>
      </div>
    `;

    scoreContainer.innerHTML = html;
    container.style.display = "none";
  }

function navigateHistory(direction) {
  currentPage += direction;
  viewHistory();
}

function toggleSortOrder() {
  sortNewestFirst = !sortNewestFirst;
  viewHistory();
}

function restartQuiz() {
  answeredQuestions = new Array(quizData.length).fill(false);
  scoreContainer.innerHTML = '';
  container.innerHTML = '';
  currentPage = 1;
  alertElement.style.display = "none";
  startButton.style.display = "block";
  container.style.display = "none";
  questionCounter.textContent = "Ready?";
  progressBar.style.width = "0%";
}

function toggleSound() {
  const isMuted = correctSound.muted && wrongSound.muted;
  correctSound.muted = !isMuted;
  wrongSound.muted = !isMuted;
  document.getElementById("sound-icon").textContent = isMuted ? "🔊" : "🔈";
  document.getElementById("sound-text").textContent = isMuted ? "Sound ON" : "Sound OFF";
}
</script>

</body>
</html>
